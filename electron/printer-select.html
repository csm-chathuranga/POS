<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Select Printer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f172a;
    color: #f1f5f9;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── Title bar ── */
  .titlebar {
    background: #1e293b;
    border-bottom: 1px solid #334155;
    padding: 14px 18px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .titlebar svg { color: #38bdf8; flex-shrink: 0; }
  .titlebar h1  { font-size: 14px; font-weight: 600; color: #f1f5f9; }
  .titlebar p   { font-size: 11px; color: #94a3b8; margin-top: 1px; }

  /* ── Printer list ── */
  .list-wrap {
    flex: 1;
    overflow-y: auto;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .list-wrap::-webkit-scrollbar { width: 5px; }
  .list-wrap::-webkit-scrollbar-track { background: transparent; }
  .list-wrap::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

  .printer-card {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1.5px solid #1e293b;
    background: #1e293b;
    cursor: pointer;
    transition: border-color 0.13s, background 0.13s, transform 0.1s;
  }
  .printer-card:hover {
    border-color: #38bdf8;
    background: #0c1929;
    transform: translateY(-1px);
  }
  .printer-card.default-printer {
    border-color: #2563eb33;
  }
  .printer-icon {
    width: 36px; height: 36px;
    background: #0f172a;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    color: #38bdf8;
  }
  .printer-info { flex: 1; min-width: 0; }
  .printer-name {
    font-size: 13px;
    font-weight: 600;
    color: #f1f5f9;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .printer-meta {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .badge {
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 4px;
    background: #1d4ed8;
    color: #bfdbfe;
    letter-spacing: 0.3px;
  }
  .badge-offline {
    background: #7f1d1d;
    color: #fca5a5;
  }

  /* ── States ── */
  .state-box {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #64748b;
    padding: 20px;
    text-align: center;
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid #334155;
    border-top-color: #38bdf8;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer ── */
  .footer {
    padding: 10px 14px;
    border-top: 1px solid #1e293b;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }
  .btn-cancel {
    font-size: 13px;
    font-weight: 500;
    padding: 7px 18px;
    border-radius: 7px;
    border: 1.5px solid #334155;
    background: transparent;
    color: #94a3b8;
    cursor: pointer;
    transition: border-color 0.12s, color 0.12s;
  }
  .btn-cancel:hover { border-color: #64748b; color: #f1f5f9; }
  .btn-refresh {
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 7px;
    border: 1.5px solid #334155;
    background: transparent;
    color: #38bdf8;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.12s, background 0.12s;
  }
  .btn-refresh:hover { border-color: #38bdf8; background: #0c1929; }
  .btn-refresh svg { transition: transform 0.4s; }
  .btn-refresh.spinning svg { animation: spin 0.8s linear infinite; }
</style>
</head>
<body>

<!-- Title bar -->
<div class="titlebar">
  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
    <path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
  </svg>
  <div>
    <h1>Select Printer</h1>
    <p>මුද්‍රකය තෝරන්න</p>
  </div>
</div>

<!-- Dynamic content -->
<div id="content" class="state-box">
  <div class="spinner"></div>
  <span style="font-size:13px;">Loading printers…</span>
</div>

<!-- Footer -->
<div class="footer">
  <button id="btn-refresh" class="btn-refresh" onclick="refresh()">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
    </svg>
    Refresh
  </button>
  <button class="btn-cancel" onclick="window.printerAPI.cancel()">Cancel</button>
</div>

<script>
  const PRINTER_ICON = `
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
      <path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
    </svg>`;

  // Keep the full printer list so event delegation can look up by index
  let printerList = [];

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function load() {
    const content = document.getElementById('content');
    try {
      printerList = await window.printerAPI.getPrinters();

      if (!printerList || printerList.length === 0) {
        content.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="#475569" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M12 3a9 9 0 100 18A9 9 0 0012 3z"/>
          </svg>
          <span style="font-size:13px;color:#94a3b8;">No printers found</span>`;
        content.className = 'state-box';
        return;
      }

      content.className = 'list-wrap';
      // Use data-index instead of onclick with the name — avoids quote-escaping bugs
      content.innerHTML = printerList.map((p, i) => {
        const offline = p.status !== 0 && p.status != null;
        return `
          <div class="printer-card${p.isDefault ? ' default-printer' : ''}" data-index="${i}">
            <div class="printer-icon">${PRINTER_ICON}</div>
            <div class="printer-info">
              <div class="printer-name">${esc(p.displayName || p.name)}</div>
              <div class="printer-meta">
                ${p.isDefault ? '<span class="badge">Default</span>' : ''}
                ${offline     ? '<span class="badge badge-offline">Offline</span>' : ''}
                <span>${esc(p.name)}</span>
              </div>
            </div>
          </div>`;
      }).join('');

      // Single delegated listener — no inline onclick, no quote issues
      content.addEventListener('click', (e) => {
        const card = e.target.closest('[data-index]');
        if (!card) return;
        const printer = printerList[parseInt(card.dataset.index)];
        if (printer) window.printerAPI.confirm(printer.name);
      });

    } catch (err) {
      content.innerHTML = `<span style="font-size:13px;color:#f87171;">Error: ${esc(err.message)}</span>`;
      content.className = 'state-box';
    }
  }

  async function refresh() {
    const btn = document.getElementById('btn-refresh');
    btn.classList.add('spinning');
    btn.disabled = true;
    await load();
    btn.classList.remove('spinning');
    btn.disabled = false;
  }

  load();
</script>
</body>
</html>
